services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - SOPS_AGE_KEY_FILE=/run/secrets/age.key
    volumes:
      # Llave privada de age: vive solo en el servidor, fuera del repo y de
      # la imagen. Ver DEPLOY.md para generarla y dónde colocarla.
      - /etc/dashboards-im/age.key:/run/secrets/age.key:ro

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
